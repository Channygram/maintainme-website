<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#070B14;stop-opacity:1" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>

  <!-- Shield base with subtle shadow -->
  <g filter="url(#glow)">
    <!-- Outer shield for depth -->
    <path d="M 512 80 C 512 80 320 200 320 420 C 320 620 512 880 512 880 C 512 880 704 620 704 420 C 704 200 512 80 512 80 Z"
          fill="url(#primaryGradient)"
          opacity="0.95"/>
  </g>

  <!-- Inner shield with lighter gradient for dimension -->
  <path d="M 512 130 C 512 130 370 230 370 420 C 370 590 512 820 512 820 C 512 820 654 590 654 420 C 654 230 512 130 512 130 Z"
        fill="none"
        stroke="url(#primaryGradient)"
        stroke-width="24"
        opacity="0.4"/>

  <!-- Checkmark inside shield -->
  <g>
    <!-- Left check stroke (diagonal down-right) -->
    <line x1="420" y1="500" x2="480" y2="580"
          stroke="#FFFFFF"
          stroke-width="56"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.95"/>

    <!-- Right check stroke (diagonal up-right) -->
    <line x1="480" y1="580" x2="620" y2="380"
          stroke="#FFFFFF"
          stroke-width="56"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.95"/>
  </g>

  <!-- Accent highlight on top for polish -->
  <ellipse cx="512" cy="280" rx="80" ry="40"
           fill="#FFFFFF"
           opacity="0.08"/>
</svg>